<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PSU Control Panel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">⎓</span>
      <div>
        <h1 id="modelLabel">PSU Control</h1>
        <p class="subtitle" id="modelSub">Programmable DC Power Supply · SCPI</p>
      </div>
    </div>
    <div class="conn-status">
      <span class="dot" id="connDot"></span>
      <span id="connLabel">Disconnected</span>
    </div>
  </header>

  <main>
    <section class="card">
      <h2>Connection</h2>
      <div class="row">
        <label>Model
          <select id="model">
            <option value="itn6332b">ITECH IT-N6332B (bidirectional)</option>
            <option value="cpx200dp">Aim-TTi CPX200DP (dual-output)</option>
          </select>
        </label>
        <label>Host / IP<input type="text" id="host" placeholder="192.168.1.50" value="192.168.1.50" /></label>
        <label>Port<input type="number" id="port" placeholder="(default)" /></label>
        <label class="grow">VISA resource (optional)<input type="text" id="visa" placeholder="USB0::0x2EC7::...::INSTR" /></label>
      </div>
      <div class="row btn-row">
        <button class="btn primary" id="btnConnect">Connect</button>
        <button class="btn" id="btnDemo">Demo (simulator)</button>
        <button class="btn danger" id="btnDisconnect" disabled>Disconnect</button>
        <span class="idn" id="idn"></span>
      </div>
    </section>

    <section class="card" id="masterCard">
      <h2>Master controls</h2>
      <div class="row btn-row">
        <button class="btn ok" id="btnAllOn" disabled>All outputs ON</button>
        <button class="btn danger" id="btnAllOff" disabled>All outputs OFF</button>
        <button class="btn" id="btnReset" disabled>*RST</button>
        <span class="hint">Current/power are signed: negative = sinking</span>
      </div>
    </section>

    <div id="channels" class="channels"></div>
  </main>

  <template id="channelTemplate">
    <section class="card channel">
      <div class="ch-head">
        <h2 class="ch-name"></h2>
        <span class="mode-badge">—</span>
      </div>
      <div class="meters">
        <div class="meter v"><span class="value m-volt">—</span><span class="unit">V</span><span class="caption">Voltage</span></div>
        <div class="meter i"><span class="value m-curr">—</span><span class="unit">A</span><span class="caption">Current</span></div>
        <div class="meter p"><span class="value m-pow">—</span><span class="unit">W</span><span class="caption">Power</span></div>
      </div>
      <canvas class="chart" width="520" height="120"></canvas>
      <div class="row">
        <label>Priority
          <select class="set-priority">
            <option value="VOLTAGE">CV</option>
            <option value="CURRENT">CC</option>
          </select>
        </label>
        <label>Voltage (V)<input type="number" class="set-volt" step="0.001" /></label>
        <label>Current (A)<input type="number" class="set-curr" step="0.001" /></label>
      </div>
      <div class="row">
        <label>OVP (V)<input type="number" class="set-ovp" step="0.1" placeholder="off" /></label>
        <label>OCP (A)<input type="number" class="set-ocp" step="0.1" placeholder="off" /></label>
        <label>OPP (W)<input type="number" class="set-opp" step="1" placeholder="off" /></label>
      </div>
      <div class="row btn-row">
        <button class="btn primary btn-apply">Apply</button>
        <button class="btn btn-prot">Set protection</button>
        <button class="btn warn btn-clear">Clear trip</button>
        <button class="bigtoggle off btn-output"><span class="state">OUTPUT OFF</span></button>
      </div>
      <div class="prot-status ok">Protection: —</div>
    </section>
  </template>

  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
