<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ITECH IT-N6332B — Triple-Channel Control</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">⎓</span>
      <div>
        <h1>IT-N6332B</h1>
        <p class="subtitle">Triple-Channel Programmable DC Power Supply · SCPI</p>
      </div>
    </div>
    <div class="conn-status" id="connStatus">
      <span class="dot" id="connDot"></span>
      <span id="connLabel">Disconnected</span>
    </div>
  </header>

  <main>
    <!-- Connection -->
    <section class="card" id="connectionCard">
      <h2>Connection</h2>
      <div class="row">
        <label>Host / IP
          <input type="text" id="host" placeholder="192.168.1.50" value="192.168.1.50" />
        </label>
        <label>Port
          <input type="number" id="port" value="30000" />
        </label>
        <label class="grow">VISA resource (optional)
          <input type="text" id="visa" placeholder="USB0::0x2EC7::...::INSTR" />
        </label>
      </div>
      <div class="row btn-row">
        <button class="btn primary" id="btnConnect">Connect</button>
        <button class="btn" id="btnDemo">Demo (simulator)</button>
        <button class="btn danger" id="btnDisconnect" disabled>Disconnect</button>
        <span class="idn" id="idn"></span>
      </div>
    </section>

    <!-- Global controls -->
    <section class="card" id="globalCard">
      <h2>Master controls</h2>
      <div class="row btn-row">
        <button class="btn ok" id="btnAllOn" disabled>All outputs ON</button>
        <button class="btn danger" id="btnAllOff" disabled>All outputs OFF</button>
        <label>CH1+CH2 tracking
          <select id="tracking" disabled>
            <option value="OFF">Independent</option>
            <option value="SERies">Series</option>
            <option value="PARallel">Parallel</option>
          </select>
        </label>
        <button class="btn" id="btnReset" disabled>*RST</button>
      </div>
    </section>

    <!-- Channel cards get injected here -->
    <div id="channels" class="channels"></div>
  </main>

  <!-- Template for one channel card -->
  <template id="channelTemplate">
    <section class="card channel">
      <div class="ch-head">
        <h2 class="ch-name"></h2>
        <span class="ch-rating"></span>
        <span class="mode-badge">—</span>
      </div>
      <div class="meters">
        <div class="meter v"><span class="value m-volt">—</span><span class="unit">V</span><span class="caption">Voltage</span></div>
        <div class="meter i"><span class="value m-curr">—</span><span class="unit">A</span><span class="caption">Current</span></div>
        <div class="meter p"><span class="value m-pow">—</span><span class="unit">W</span><span class="caption">Power</span></div>
      </div>
      <canvas class="chart" width="520" height="120"></canvas>
      <div class="row">
        <label>Voltage (V)<input type="number" class="set-volt" step="0.001" /></label>
        <label>Current limit (A)<input type="number" class="set-curr" step="0.001" /></label>
        <label>OVP (V)<input type="number" class="set-ovp" step="0.1" placeholder="off" /></label>
      </div>
      <div class="row btn-row">
        <button class="btn primary btn-apply">Apply</button>
        <button class="btn btn-ovp">Set OVP</button>
        <button class="bigtoggle off btn-output"><span class="state">OUTPUT OFF</span></button>
      </div>
    </section>
  </template>

  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
