<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ITECH IT-N6332B — Control Panel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">⎓</span>
      <div>
        <h1>IT-N6332B</h1>
        <p class="subtitle">Bidirectional DC Power Supply · SCPI Control</p>
      </div>
    </div>
    <div class="conn-status" id="connStatus">
      <span class="dot" id="connDot"></span>
      <span id="connLabel">Disconnected</span>
    </div>
  </header>

  <main>
    <!-- Connection -->
    <section class="card" id="connectionCard">
      <h2>Connection</h2>
      <div class="row">
        <label>Host / IP
          <input type="text" id="host" placeholder="192.168.1.50" value="192.168.1.50" />
        </label>
        <label>Port
          <input type="number" id="port" value="30000" />
        </label>
        <label class="grow">VISA resource (optional)
          <input type="text" id="visa" placeholder="USB0::0x2EC7::0x6300::...::INSTR" />
        </label>
      </div>
      <div class="row btn-row">
        <button class="btn primary" id="btnConnect">Connect</button>
        <button class="btn" id="btnDemo">Demo (simulator)</button>
        <button class="btn danger" id="btnDisconnect" disabled>Disconnect</button>
        <span class="idn" id="idn"></span>
      </div>
    </section>

    <div class="grid">
      <!-- Live measurements -->
      <section class="card readouts">
        <h2>Measurements</h2>
        <div class="meters">
          <div class="meter v"><span class="value" id="mVoltage">—</span><span class="unit">V</span><span class="caption">Voltage</span></div>
          <div class="meter i"><span class="value" id="mCurrent">—</span><span class="unit">A</span><span class="caption">Current</span></div>
          <div class="meter p"><span class="value" id="mPower">—</span><span class="unit">W</span><span class="caption">Power</span></div>
        </div>
        <canvas id="chart" width="640" height="220"></canvas>
        <div class="legend">
          <span><i class="swatch v"></i> Voltage (V)</span>
          <span><i class="swatch i"></i> Current (A)</span>
        </div>
      </section>

      <!-- Output + setpoints -->
      <section class="card controls">
        <h2>Output</h2>
        <div class="output-toggle">
          <button class="bigtoggle off" id="btnOutput" disabled>
            <span class="state">OUTPUT OFF</span>
          </button>
        </div>

        <h2>Setpoints</h2>
        <div class="row">
          <label>Mode
            <select id="mode">
              <option value="VOLTAGE">Constant Voltage (CV)</option>
              <option value="CURRENT">Constant Current (CC)</option>
            </select>
          </label>
        </div>
        <div class="row">
          <label>Voltage (V)
            <input type="number" id="setVoltage" step="0.01" value="12.00" />
          </label>
          <label>Current limit (A)
            <input type="number" id="setCurrent" step="0.01" value="2.00" />
          </label>
        </div>
        <div class="row btn-row">
          <button class="btn primary" id="btnApply" disabled>Apply setpoints</button>
        </div>

        <h2>Protection</h2>
        <div class="row">
          <label>OVP (V)<input type="number" id="ovp" step="0.1" placeholder="13.5" /></label>
          <label>OCP (A)<input type="number" id="ocp" step="0.1" placeholder="2.5" /></label>
          <label>OPP (W)<input type="number" id="opp" step="1" placeholder="60" /></label>
        </div>
        <div class="row btn-row">
          <button class="btn" id="btnProt" disabled>Set protection</button>
          <button class="btn warn" id="btnClearProt" disabled>Clear trip</button>
          <button class="btn" id="btnReset" disabled>*RST</button>
        </div>
        <div class="prot-status ok" id="protStatus">Protection: —</div>
      </section>
    </div>
  </main>

  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
